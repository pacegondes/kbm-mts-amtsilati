<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KBM Dashboard - Green Edition</title>
  <link rel="icon" href="https://i.ibb.co.com/1fHCTtJ5/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #10b981; /* Emerald Green */
      --primary-dark: #059669;
      --bg: #f0fdf4; /* Very light green bg */
      --card-bg: rgba(255, 255, 255, 0.95);
      --text-main: #064e3b;
      --text-muted: #6b7280;
    }

    * {
      box-sizing: border-box;
      transition: all 0.25s ease;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Navigation - Responsive Padding */
    nav {
      width: 95%;
      max-width: 1200px;
      margin: 15px auto;
      padding: 12px 20px;
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05);
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand img {
      height: 32px;
      width: auto;
    }

    .brand-text h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
    }

    /* Button Styling */
    .btn-primary {
      padding: 8px 16px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    /* Main Container - Auto Responsive Height */
    .app-wrapper {
      flex: 1;
      width: 95%;
      max-width: 1200px;
      margin: 0 auto 15px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 20px 40px -10px rgba(0,0,0,0.07);
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(16, 185, 129, 0.1);
    }

    /* Loader */
    .loader-screen {
      position: absolute;
      inset: 0;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }

    .leaf-loader {
      width: 40px;
      height: 40px;
      border: 3px solid #ecfdf5;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
    }

    iframe.loaded {
      opacity: 1;
    }

    /* Media Queries for Mobile */
    @media (max-width: 640px) {
      nav {
        padding: 10px 15px;
      }
      .brand-text p {
        display: none; /* Sembunyikan deskripsi di HP agar lega */
      }
      .btn-primary {
        font-size: 12px;
        padding: 6px 12px;
      }
      .app-wrapper {
        width: 100%;
        border-radius: 0; /* Full screen di HP tanpa round corner */
        margin-bottom: 0;
      }
    }
  </style>
</head>
<body>

  <nav>
    <div class="brand">
      <img src="https://i.ibb.co.com/1fHCTtJ5/logo.png" alt="Logo">
      <div class="brand-text">
        <h1>SISTEM KBM</h1>
        <p style="margin:0; font-size:10px; color:var(--text-muted)">Dashboard Akademik Terpadu</p>
      </div>
    </div>
    
    <a href="https://script.google.com/macros/s/AKfycbzC6J2FBEnglLQJQK9pO6VwzZI2LLqBZJq_UB0VMqEKRKs_8XB8rwe3J76xhpZb1aq1/exec?page=akademik" 
       target="_blank" class="btn-primary">
       Buka Akademik
    </a>
  </nav>

  <div class="app-wrapper">
    <div class="loader-screen" id="loader">
      <div class="leaf-loader"></div>
      <p style="margin-top: 15px; font-size: 13px; color: var(--primary); font-weight: 600;">Mengambil Data...</p>
    </div>

    <iframe
      id="app"
      src="https://script.google.com/macros/s/AKfycbzC6J2FBEnglLQJQK9pO6VwzZI2LLqBZJq_UB0VMqEKRKs_8XB8rwe3J76xhpZb1aq1/exec?page=wali"
      onload="finishLoad()"
      allowfullscreen="true">
    </iframe>
  </div>

  <script>
    function finishLoad() {
      const loader = document.getElementById('loader');
      const iframe = document.getElementById('app');
      
      loader.style.opacity = '0';
      setTimeout(() => {
        loader.style.display = 'none';
        iframe.classList.add('loaded');
      }, 300);
    }
  </script>

</body>
</html>
