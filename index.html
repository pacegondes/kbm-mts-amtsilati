<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>KBM OS - Smart Dashboard</title>
  <link rel="icon" href="https://i.ibb.co.com/1fHCTtJ5/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Bento:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #f2f5f8;
      --accent: #22c55e; /* Hijau Segar */
      --glass: rgba(255, 255, 255, 0.8);
      --shadow: 0 8px 32px rgba(0,0,0,0.05);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-color);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* --- TOP BAR --- */
    header {
      padding: 20px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: transparent;
    }

    .user-profile {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      background: var(--accent);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
    }

    .greeting h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 800;
      color: #1e293b;
    }

    .greeting p {
      margin: 0;
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* --- MAIN WORKSPACE --- */
    main {
      flex: 1;
      margin: 0 15px 90px; /* Jarak untuk Bottom Nav */
      background: #ffffff;
      border-radius: 30px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      border: 4px solid #ffffff;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 26px;
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* --- DYNAMIC BOTTOM NAV --- */
    .bottom-nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 400px;
      height: 65px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 22px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 0 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: #94a3b8;
      font-size: 10px;
      font-weight: 600;
      gap: 4px;
      transition: 0.3s;
    }

    .nav-item.active {
      color: var(--accent);
    }

    .nav-item i {
      font-size: 20px;
    }

    .center-btn {
      width: 50px;
      height: 50px;
      background: var(--accent);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: -35px;
      box-shadow: 0 8px 20px rgba(34, 197, 94, 0.4);
      border: 4px solid var(--bg-color);
      color: white;
    }

    /* --- LOADING ANIMATION --- */
    #loader {
      position: absolute;
      inset: 0;
      background: white;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: 0.5s;
    }

    .dot-spinner {
      display: flex;
      gap: 5px;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 0.5s infinite alternate;
    }

    .dot:nth-child(2) { animation-delay: 0.1s; }
    .dot:nth-child(3) { animation-delay: 0.2s; }

    @keyframes bounce { to { transform: translateY(-10px); opacity: 0.3; } }

    /* HP Tweak */
    @media (max-width: 600px) {
      header { padding: 15px 20px; }
      main { margin: 0 10px 85px; border-radius: 24px; }
      .bottom-nav { width: 95%; bottom: 10px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="user-profile">
      <div class="avatar">A</div>
      <div class="greeting">
        <p>Selamat Datang,</p>
        <h2>Admin Akademik</h2>
      </div>
    </div>
    <div style="font-size: 20px;">🔔</div>
  </header>

  <main id="container">
    <div id="loader">
      <div class="dot-spinner">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <p style="font-size: 12px; color: #64748b; margin-top: 15px; font-weight: 600;">Sinkronisasi...</p>
    </div>

    <iframe
      id="appFrame"
      src="https://script.google.com/macros/s/AKfycbzC6J2FBEnglLQJQK9pO6VwzZI2LLqBZJq_UB0VMqEKRKs_8XB8rwe3J76xhpZb1aq1/exec?page=wali"
      onload="ready()">
    </iframe>
  </main>

  <!-- Navigation ala Mobile App -->
  <div class="bottom-nav">
    <a href="#" class="nav-item active">
      <span>🏠</span>
      <span>Home</span>
    </a>
    <a href="https://script.google.com/macros/s/AKfycbzC6J2FBEnglLQJQK9pO6VwzZI2LLqBZJq_UB0VMqEKRKs_8XB8rwe3J76xhpZb1aq1/exec?page=akademik" target="_blank" class="nav-item center-btn">
      <span style="font-size: 24px;">+</span>
    </a>
    <a href="#" class="nav-item" onclick="location.reload()">
      <span>🔄</span>
      <span>Refresh</span>
    </a>
  </div>

  <script>
    function ready() {
      const loader = document.getElementById('loader');
      loader.style.opacity = '0';
      setTimeout(() => loader.style.display = 'none', 500);
    }
    
    // Efek saat frame ditekan (hanya estetika)
    document.getElementById('container').addEventListener('click', function() {
      this.style.transform = 'scale(0.99)';
      setTimeout(() => this.style.transform = 'scale(1)', 150);
    });
  </script>

</body>
</html>
