<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Portal KBM - Dashboard</title>
  <link rel="icon" href="https://i.ibb.co.com/1fHCTtJ5/logo.png" />
  <!-- Menggunakan font Nunito Sans untuk kesan ramah & rapi ala E-commerce -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      /* Palet Warna ala Tokopedia */
      --tk-green: #00AA5B; 
      --tk-green-dark: #00884A;
      --tk-bg: #F3F4F5; /* Background luar abu-abu terang */
      --tk-surface: #FFFFFF; /* Background card putih bersih */
      --tk-text-dark: #31353B;
      --tk-text-gray: #6D7588;
      --tk-border: #E5E7E9;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Nunito Sans', sans-serif;
    }

    body {
      background-color: var(--tk-bg);
      color: var(--tk-text-dark);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* --- HEADER (Navbar Fixed) --- */
    .header {
      background-color: var(--tk-surface);
      border-bottom: 1px solid var(--tk-border);
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 1px 6px 0 rgba(49,53,59,0.12);
    }

    .header-container {
      max-width: 1200px;
      margin: 0 auto;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
    }

    .brand-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-area img {
      height: 32px;
      border-radius: 4px;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .brand-text h1 {
      font-size: 16px;
      font-weight: 800;
      color: var(--tk-text-dark);
      line-height: 1.2;
    }

    .brand-text span {
      font-size: 12px;
      color: var(--tk-text-gray);
      font-weight: 600;
    }

    /* Tombol Utama */
    .btn-action {
      background-color: var(--tk-green);
      color: #FFFFFF;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 8px;
      transition: background-color 0.2s ease;
    }

    .btn-action:hover {
      background-color: var(--tk-green-dark);
    }

    /* --- MAIN CONTENT (App Wrapper) --- */
    .main-content {
      flex: 1;
      width: 100%;
      max-width: 1200px;
      margin: 16px auto;
      background-color: var(--tk-surface);
      border-radius: 12px;
      border: 1px solid var(--tk-border);
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      position: relative;
      overflow: hidden;
    }

    /* Loading State */
    .loader-container {
      position: absolute;
      inset: 0;
      background-color: var(--tk-surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 0.4s ease;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--tk-border);
      border-top-color: var(--tk-green);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loader-text {
      margin-top: 16px;
      font-size: 14px;
      font-weight: 700;
      color: var(--tk-text-gray);
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* Iframe */
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    iframe.ready {
      opacity: 1;
    }

    /* --- RESPONSIVE MOBILE --- */
    @media screen and (max-width: 768px) {
      .header-container {
        height: 56px;
        padding: 0 12px;
      }
      
      .brand-text span {
        display: none; /* Sembunyikan sub-judul di HP */
      }

      .btn-action {
        padding: 6px 12px;
        font-size: 12px;
      }

      .main-content {
        margin: 0; /* Hilangkan margin luar */
        border-radius: 0; /* Ubah ke bentuk kotak penuh */
        border-left: none;
        border-right: none;
        border-bottom: none;
        box-shadow: none;
        height: calc(100vh - 56px); /* Tinggi presisi di HP */
      }
    }
  </style>
</head>
<body>

  <!-- Header Navigasi -->
  <header class="header">
    <div class="header-container">
      <div class="brand-area">
        <img src="https://i.ibb.co.com/1fHCTtJ5/logo.png" alt="Logo KBM">
        <div class="brand-text">
          <h1>Laporan KBM</h1>
          <span>Portal Akademik Terpadu</span>
        </div>
      </div>
      <a href="https://script.google.com/macros/s/AKfycbzC6J2FBEnglLQJQK9pO6VwzZI2LLqBZJq_UB0VMqEKRKs_8XB8rwe3J76xhpZb1aq1/exec?page=akademik" 
         target="_blank" class="btn-action">
         Sistem Akademik
      </a>
    </div>
  </header>

  <!-- Kontainer Aplikasi -->
  <main class="main-content">
    <div id="loading" class="loader-container">
      <div class="spinner"></div>
      <div class="loader-text">Memuat Sistem...</div>
    </div>

    <iframe
      id="appFrame"
      src="https://script.google.com/macros/s/AKfycbzC6J2FBEnglLQJQK9pO6VwzZI2LLqBZJq_UB0VMqEKRKs_8XB8rwe3J76xhpZb1aq1/exec?page=wali"
      onload="hideLoading()"
      allowfullscreen="true">
    </iframe>
  </main>

  <script>
    function hideLoading() {
      const loader = document.getElementById('loading');
      const iframe = document.getElementById('appFrame');
      
      // Efek transisi smooth
      loader.style.opacity = '0';
      setTimeout(() => {
        loader.style.display = 'none';
        iframe.classList.add('ready');
      }, 400); // Tunggu animasi opacity selesai
    }
  </script>

</body>
</html>
