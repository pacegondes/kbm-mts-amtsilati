<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KBM Dashboard - Lyra Style</title>
  <link rel="icon" href="https://i.ibb.co.com/1fHCTtJ5/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #6366f1; /* Indigo vibrant ala Lyra */
      --bg: #f8fafc;
      --card-bg: rgba(255, 255, 255, 0.9);
      --text-main: #1e293b;
      --text-muted: #64748b;
    }

    * {
      box-sizing: border-box;
      transition: all 0.3s ease;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Floating Navigation */
    nav {
      width: 1280px;
      margin: 20px auto 10px;
      padding: 15px 30px;
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .brand img {
      height: 35px;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
    }

    .brand-text h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .brand-text p {
      margin: 0;
      font-size: 12px;
      color: var(--text-muted);
    }

    .nav-links {
      display: flex;
      gap: 10px;
    }

    .btn-link {
      padding: 10px 20px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      background: transparent;
    }

    .btn-link:hover {
      color: var(--accent);
      background: rgba(99, 102, 241, 0.08);
    }

    .btn-primary {
      background: var(--accent);
      color: white !important;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(99, 102, 241, 0.4);
      background: #4f46e5;
    }

    /* App Container */
    .app-container {
      width: 1280px;
      flex-grow: 1;
      margin: 0 auto 20px;
      position: relative;
      background: #fff;
      border-radius: 24px;
      border: 1px solid rgba(0,0,0,0.05);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    /* Loading State ala Lyra */
    .loader-overlay {
      position: absolute;
      inset: 0;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }

    .shimmer {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(99, 102, 241, 0.1);
      border-left-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      transition: opacity 0.5s ease-in;
    }

    iframe.loaded {
      opacity: 1;
    }

    /* Footer Credits */
    .footer {
      text-align: center;
      padding-bottom: 15px;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <nav>
    <div class="brand">
      <img src="https://i.ibb.co.com/1fHCTtJ5/logo.png" alt="Logo">
      <div class="brand-text">
        <h1>KBM ACADEMY</h1>
        <p>Sistem Informasi Akademik Siswa</p>
      </div>
    </div>
    
    <div class="nav-links">
      <a href="#" class="btn-link">Panduan</a>
      <a href="https://script.google.com/macros/s/AKfycbzC6J2FBEnglLQJQK9pO6VwzZI2LLqBZJq_UB0VMqEKRKs_8XB8rwe3J76xhpZb1aq1/exec?page=akademik" 
         target="_blank" class="btn-link btn-primary">
         Sistem Akademik
      </a>
    </div>
  </nav>

  <div class="app-container">
    <div class="loader-overlay" id="loader">
      <div class="shimmer"></div>
      <p style="margin-top: 15px; font-weight: 500; font-size: 14px; color: var(--text-muted)">Sinkronisasi Data...</p>
    </div>

    <iframe
      id="app"
      src="https://script.google.com/macros/s/AKfycbzC6J2FBEnglLQJQK9pO6VwzZI2LLqBZJq_UB0VMqEKRKs_8XB8rwe3J76xhpZb1aq1/exec?page=wali"
      onload="onIframeLoad()"
      allowfullscreen="true">
    </iframe>
  </div>

  <div class="footer">
    &copy; 2026 Academic Management System • Crafted with Care
  </div>

  <script>
    function onIframeLoad() {
      const loader = document.getElementById('loader');
      const iframe = document.getElementById('app');
      
      // Memberikan sedikit jeda untuk animasi yang smooth
      setTimeout(() => {
        loader.style.opacity = '0';
        setTimeout(() => {
          loader.style.display = 'none';
          iframe.classList.add('loaded');
        }, 300);
      }, 500);
    }
  </script>

</body>
</html>
